<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>

    <header class="header-main">
        <nav>
            <h1 class="title-main">
                studio <span class="title-second-word">portafolio</span>
            </h1>

            <button class="menu-toggle" id="menu-toggle">☰</button>

            <div class="nav-main" id="nav">
                <a href="/src/views/sobre-mi.html">sobre mí</a>
                <a href="/src/views/proyectos.html">proyectos</a>
                <a href="/src/views/contacto.html">contacto</a>
                <a href="/src/views/mascotas.html">mascotas</a>
            </div>
        </nav>
    </header>

    <main>

        <!-- HERO -->
        <section class="hero">
            <div class="hero-text">
                <h2 class="slogan">
                    construyo experiencias <span class="highlight">digitales</span>
                </h2>

                <p class="description" id="texto">
                    Este es mi portafolio profesional donde muestro mis proyectos y habilidades.
                </p>

                <div class="buttons">
                    <button id="btn-cambiar" class="btn">Cambiar texto</button>
                    <button id="btn-toggle" class="btn-2">Mostrar/Ocultar</button>
                </div>

                <div id="extra" class="extra">
                    <p>Contenido adicional visible con JavaScript 🚀</p>
                </div>
            </div>

            <div class="hero-image">
                <img src="/public/img/codigo.jpg" alt="programación">
            </div>
        </section>
        <section class="extra-section">
            <h2>Mis habilidades</h2>

            <div class="skills">
                <div class="skill-card">HTML</div>
                <div class="skill-card">CSS</div>
                <div class="skill-card">JavaScript</div>
            </div>

            <button id="btn-theme">Cambiar estilo 🎨</button>
        </section>

    </main>

    <footer>
        <p>© 2024 Dylan. Todos los derechos reservados.</p>
    </footer>

    <script src="/src/js/script.js"></script>

</body>

</html>
